<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form with Table Alignment</title>
    <link rel="stylesheet" href="signup.css">

</head>
<body>
    <form>
        <fieldset>
            <legend>Sign Up</legend>
            <table>
                <tr>
                    <td><label for="Username">Username:</label></td>
                    <td><input type="text" name="Username" id="Username" placeholder="Enter The Username" ></td>
                </tr>
                <tr>
                    <td><label for="Password">Password:</label></td>
                    <td><input type="password"name="Password" id="Password" placeholder="Enter The Password" ></td>
                </tr>
                <tr>
                    <td><label for="Phone Number">Phone Number:</label></td>
                    <td><input type="number" name="Phone Number" placeholder="Enter Phone No." minlength="10" maxlength="10" id="Phone Number"></td>
                </tr>
                <tr>
                    <td><label for="Email">Email Id:</label></td>
                    <td><input type="email"  name="Email" id="Email" placeholder="Enter Email-Id"></td>
                </tr>
                
               <tr>
                <td>
                        <label for="gender">Gender</label>
                        <input type="radio" name="gender" id="gender" value="Male">Male
                        <input type="radio" name="gender" id="gender" value="Female">Female
                        <input type="radio" name="gender" id="gender" value="Others">Others
                </td></tr>
                <tr>
                    <td colspan="2" style="text-align:center;">
                        <button type="submit">Submit</button>
                        <button type="reset">Cancel</button>
                    </td>
                </tr>
            </table>
        </fieldset>
    </form>
</body>
<script src="./signup.js"></script>
</html>
